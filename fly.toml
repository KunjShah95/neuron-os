# ── Fly.io Deployment Config ─────────────────────────────────────────
# Docs: https://fly.io/docs/reference/configuration/
#
# Generated by `fly launch`. Edit as needed.
#
# The default CMD from the Dockerfile runs the API server (serve mode).
# To run the Telegram bot instead (for mobile access), change the cmd:
#
#   fly machine update <machine-id> --command "bun run index.ts telegram"
#
# Or uncomment the process group config below.
# ──────────────────────────────────────────────────────────────────────

app = "neuron-os"
primary_region = "iad"  # change to your nearest region

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true

  # ── Auto-stop/start (saves money on free tier) ─────────────────────
  # With these settings, Fly.io stops your VM when idle and starts it
  # on the next request. For Telegram bot, set min_machines_running = 1
  # to keep it always on (~$2/month). Comment out to disable.
  auto_stop_machines = false       # Telegram bot needs to stay connected
  auto_start_machines = true
  min_machines_running = 1         # keep 1 instance always-on for Telegram

[[services.ports]]
  handlers = ["http"]
  port = 80

[[services.ports]]
  handlers = ["tls", "http"]
  port = 443

[env]
  AEGIS_LOG_LEVEL = "info"

# ── Process Groups ──────────────────────────────────────────────────
# Uncomment to run the Telegram bot instead of the API server:
#
# [processes]
#   app = "telegram"
#
# Then edit [[services]] above to add the right concurrency for Telegram.

# ── Persistent Volume (optional) ───────────────────────────────────
# Mount a volume to preserve SQLite data across restarts:
#
#   fly volumes create aegis_data --size 1
#
# ── Secrets ─────────────────────────────────────────────────────────
# Set secrets via the CLI (never commit secrets):
#
#   fly secrets set TELEGRAM_BOT_TOKEN="123456:ABCdef..."
#   fly secrets set ANTHROPIC_API_KEY="sk-ant-..."
#   fly secrets set TELEGRAM_ALLOWED_USERS="123456789,987654321"
