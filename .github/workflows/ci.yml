name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    name: Build / Test / Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.x'

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run tsc --noEmit

      - name: Lint (if eslint available)
        run: |
          if command -v eslint >/dev/null 2>&1 || [ -f node_modules/.bin/eslint ]; then
            bun run eslint . --max-warnings=0
          else
            echo "eslint not installed; skipping lint"
          fi

      - name: Run tests
        run: bun run scripts/run-tests.ts

      - name: Upload coverage/artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aegis-ci-logs
          path: |
            coverage/
            .eslintcache
          continue-on-error: true
