name: Release (main)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.x'

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run tsc --noEmit

      - name: Run tests
        run: bun run scripts/run-tests.ts

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.x'

      - name: Cache dashboard dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: dashboard-bun-${{ hashFiles('dashboard/bun.lock') }}
          restore-keys: dashboard-bun-

      - name: Install dashboard dependencies
        run: bun install --frozen-lockfile
        working-directory: dashboard

      - name: Build dashboard
        run: bun run build
        working-directory: dashboard

  website:
    name: Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.x'

      - name: Cache website dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: website-bun-${{ hashFiles('website/package-lock.json') }}
          restore-keys: website-bun-

      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: website

      - name: Typecheck website
        run: bunx tsc -b
        working-directory: website

      - name: Build website
        run: bun run build
        working-directory: website

  release:
    name: Release
    needs: [test, dashboard, website]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.x'

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install dashboard dependencies
        run: bun install --frozen-lockfile
        working-directory: dashboard

      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: website

      - name: Typecheck
        run: bun run --bun tsc --noEmit

      - name: Typecheck website
        run: bunx tsc -b
        working-directory: website

      - name: Build dashboard
        run: bun run build
        working-directory: dashboard

      - name: Build website
        run: bun run build
        working-directory: website

      - name: Create release tag
        id: tag
        run: |
          TAG="v$(date +%Y%m%d)-${GITHUB_RUN_NUMBER}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            dashboard/dist/**/*
            website/dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-source-${{ github.run_id }}
          path: .
