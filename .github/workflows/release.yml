name: Release (main)

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.x'

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run tsc --noEmit

      - name: Lint (if eslint available)
        run: |
          if command -v eslint >/dev/null 2>&1 || [ -f node_modules/.bin/eslint ]; then
            bun run eslint . --max-warnings=0
          else
            echo "eslint not installed; skipping lint"
          fi

      - name: Run tests
        run: bun run scripts/run-tests.ts

      - name: Create release tag
        id: tag
        run: |
          TAG="v$(date +%Y%m%d)-${GITHUB_RUN_NUMBER}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-source-${{ github.run_id }}
          path: .
