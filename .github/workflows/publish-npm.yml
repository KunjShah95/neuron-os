name: Publish npm

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v[0-9]*-*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish neuron-aegis to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip leading 'v' and any suffix after a hyphen for semver (e.g. v20240610-42 -> 0.0.20240610)
          # Prefer semver tags (v1.2.3); for date tags produce a valid semver
          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            # Date-based tag e.g. v20240610-42 → use package.json version as-is, just strip v
            VERSION="$(node -e "console.log(require('./package.json').version)")"
          fi
          echo "Publishing version: $VERSION"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        working-directory: packages/aegis

      - name: Publish
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "⚠️  NPM_TOKEN secret not set — skipping publish"
            echo "   Set it at: https://github.com/KunjShah95/neuron-os/settings/secrets/actions"
            exit 0
          fi
          npm publish
        working-directory: packages/aegis
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
