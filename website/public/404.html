<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Neuron OS</title>
    <script type="text/javascript">
      // GitHub Pages SPA fallback: redirect to the requested path so the
      // client-side router can take over.
      var path = window.location.pathname.replace(/^\/+/, "");
      if (path && path !== "index.html") {
        sessionStorage.setItem("spa-redirect", path + window.location.search + window.location.hash);
      }
      window.location.replace(
        window.location.origin +
        "/" +
        (path && path !== "404.html" ? "index.html" : "")
      );
    </script>
  </head>
  <body></body>
</html>
