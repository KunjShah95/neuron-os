services:
  aegis:
    build:
      context: .
      dockerfile: Dockerfile
    image: neuron-os/aegis:latest
    container_name: aegis-server
    ports:
      - "8080:8080"
    volumes:
      # Persist vault, config, and env files
      - aegis-data:/home/aegis/.aegis
      # Mount source for development (live reload)
      - ./src:/app/src:ro
      - ./index.ts:/app/index.ts:ro
    environment:
      - AEGIS_LOG_LEVEL=debug
      - AEGIS_API_CORS_ORIGINS=http://localhost:5173,http://localhost:8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    # Two-layer crash protection:
    #   1. Docker restart: unless-stopped restarts the container if supervisor fails
    #   2. Supervisor (--supervisor in Dockerfile CMD) auto-restarts the server
    #      internally with exponential backoff (1s-30s) on unplanned crashes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "const c=new AbortController();setTimeout(()=>c.abort(),8000);fetch('http://localhost:8080/api/v1/health',{signal:c.signal}).then(r=>{if(!r.ok)throw 1;return r.json()}).then(j=>{if(j.status!=='ok')throw 1;process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Development-only: hot-reload web dashboard
  dashboard-dev:
    image: oven/bun:1
    container_name: aegis-dashboard-dev
    working_dir: /app/dashboard
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app/dashboard
    command: ["bun", "run", "dev", "--host", "0.0.0.0"]
    profiles:
      - dev
    depends_on:
      - aegis

volumes:
  aegis-data:
    driver: local
